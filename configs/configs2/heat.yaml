experiment: heat



model:
  n: 16
  nx: 4

optimizer:
  max_iter: 120
  alpha: 1
  use_backtracking: true
  armijo_c: 1e-6
  backtracking_tau: 0.5
  min_step: 1e-10
  max_backtracks: 8

solver:
  mode: classical

quantum:
  shots: 64
  spectral_points: 4
  delta: 0.001

  backend_mode: aer
  ibm_backend_name: null
  ibm_channel: null
  ibm_token: null
  ibm_instance: null
  ibm_use_least_busy: true

scaling:
  sizes: [8,16,32,64]
  iterations: 400
 

plots:
  show_solution: false
  show_scaling: true
  output_dir: output/CHIP/scaling/hybrid/heat/nx_4