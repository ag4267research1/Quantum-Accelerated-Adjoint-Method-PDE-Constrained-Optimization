experiment: elliptic

experiment_type: exp4

model:
  nx: 4

optimizer:
  max_iter: 400
  alpha: 450
  use_backtracking: true
  armijo_c: 1e-6
  backtracking_tau: 0.5
  min_step: 1e-4
  max_backtracks: 30

solver:
  mode: classical

quantum:
  shots: 8192
  spectral_points: 16
  delta: 0.001
  use_preconditioning: flase

scaling:
  sizes: [16,32,64]

plots:
  show_solution: true
  show_scaling: false
  output_dir: output/classical/elliptic/exp4