experiment: heat

model:
  n: 16
  nx: 1

optimizer:
  max_iter: 20
  alpha: 1e-3
  use_backtracking: false
  armijo_c: 1e-6
  backtracking_tau: 0.5
  min_step: 1e-10
  max_backtracks: 30

solver:
  mode: hybrid

quantum:
  shots: 8192
  spectral_points: 16
  delta: 0.001
  use_preconditioning: false

scaling:
  sizes: [16]
  iterations: 1

plots:
  show_solution: true
  show_scaling: false
  output_dir: output/hybridruns_6