experiment: heat

model:
  n: 4
  nx: 2

optimizer:
  max_iter: 120
  alpha: 1
  use_backtracking: true
  armijo_c: 1e-6
  backtracking_tau: 0.5
  min_step: 1e-10
  max_backtracks: 8

solver:
  mode: hybrid

quantum:
  shots: 64
  spectral_points: 4
  delta: 0.001

  backend_mode: aer
  ibm_backend_name: null
  ibm_channel: null
  ibm_token: null
  ibm_instance: null
  ibm_use_least_busy: true

scaling:
  sizes: [4]
  iterations: 1

plots:
  show_solution: true
  show_scaling: false
  output_dir: output/ibm_hybrid_n4_nx2